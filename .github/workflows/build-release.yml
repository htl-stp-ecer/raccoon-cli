name: Build & Release

on:
  push:
    branches: [main]

env:
  VERSION: "0.1.${{ github.run_number }}"

jobs:
  build-and-release:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-ide/package-lock.json

      - name: Install web-IDE dependencies
        run: npm install
        working-directory: web-ide

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml', 'raccoon-transport/python/pyproject.toml') }}
          restore-keys: pip-

      - name: Install build tools
        run: pip install build wheel setuptools

      # --- Build raccoon-transport wheel first ---
      # Patch version in submodule at build time (submodule files stay clean in git)
      - name: Patch raccoon-transport version
        run: |
          python -c "import pathlib, re; f=pathlib.Path('raccoon-transport/python/pyproject.toml'); f.write_text(re.sub(r'^version = \".*\"', 'version = \"${{ env.VERSION }}\"', f.read_text(), flags=re.MULTILINE))"

      - name: Build raccoon-transport wheel
        run: |
          rm -rf raccoon-transport/python/dist
          cd raccoon-transport/python
          python -m build --wheel

      - name: Install raccoon-transport (build dependency)
        run: pip install raccoon-transport/python/dist/raccoon_transport-*.whl

      # --- Build raccoon wheel (includes web-IDE) ---
      - name: Build raccoon wheel
        run: |
          rm -rf dist
          python -m build --wheel
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      # --- Bundle server tarball (wheels + install.py for Pi) ---
      - name: Bundle server release
        run: |
          mkdir -p server-release
          cp raccoon-transport/python/dist/raccoon_transport-*.whl server-release/
          cp dist/raccoon_cli-*.whl server-release/
          cp install.py server-release/
          cd server-release && tar czf ../raccoon-server-v${{ env.VERSION }}.tar.gz *

      # --- Resolve artifact filenames ---
      - name: Resolve artifact filenames
        id: artifacts
        run: |
          echo "raccoon_whl=$(basename dist/raccoon_cli-*.whl)" >> "$GITHUB_OUTPUT"
          echo "transport_whl=$(basename raccoon-transport/python/dist/raccoon_transport-*.whl)" >> "$GITHUB_OUTPUT"
          echo "server_tar=raccoon-server-v${{ env.VERSION }}.tar.gz" >> "$GITHUB_OUTPUT"

      # --- Create GitHub Release ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          generate_release_notes: true
          body: |
            ## Install

            ### Laptop

            Via `gh` CLI:
            ```bash
            gh release download v${{ env.VERSION }} -R ${{ github.repository }} -p "*.whl"
            pip install ${{ steps.artifacts.outputs.transport_whl }} ${{ steps.artifacts.outputs.raccoon_whl }}
            ```

            Or if you downloaded the `.whl` files manually:
            ```bash
            pip install ${{ steps.artifacts.outputs.transport_whl }} ${{ steps.artifacts.outputs.raccoon_whl }}
            ```

            ### Pi server

            ```bash
            gh release download v${{ env.VERSION }} -R ${{ github.repository }} -p "${{ steps.artifacts.outputs.server_tar }}" && tar xzf ${{ steps.artifacts.outputs.server_tar }} && RPI_HOST=192.168.4.1 python3 install.py
            ```
          files: |
            dist/raccoon_cli-*.whl
            raccoon-transport/python/dist/raccoon_transport-*.whl
            raccoon-server-v${{ env.VERSION }}.tar.gz

      - name: Trigger raccoon-image bundle
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/htl-stp-ecer/raccoon-image/dispatches \
            -d '{"event_type":"component-released","client_payload":{"component":"raccoon-cli","version":"${{ env.VERSION }}"}}'

      # --- Upload wheel as artifact for the publish job ---
      - name: Upload raccoon-cli wheel
        uses: actions/upload-artifact@v4
        with:
          name: raccoon-cli-wheel
          path: dist/raccoon_cli-*.whl

  publish-pypi:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for PyPI Trusted Publishing

    steps:
      - name: Download raccoon-cli wheel
        uses: actions/download-artifact@v4
        with:
          name: raccoon-cli-wheel
          path: dist/

      - name: Publish raccoon-cli to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
