name: Example Project
uuid: ee396516-2bdb-4b01-8380-f7853273c125

robot:
  drive:
    kinematics:
      type: "mecanum"
      front_left_motor: front_left_motor
      back_left_motor: rear_left_motor
      front_right_motor: front_right_motor
      back_right_motor: rear_right_motor  # ensure each wheel has its own motor channel
      max_acceleration: 240.0            # rad/s² wheel accel ≈ 9 m/s² linear on 7.5 cm wheels
      max_velocity: 40.0                 # rad/s wheel speed ≈ 1.5 m/s chassis top speed
      track_width: 0.2       # meters (centre-to-centre spacing left↔right)
      wheel_radius: 0.0375   # meters (150 mm diameter wheels)
      wheelbase: 0.15        # meters (front↔rear axle spacing)

    # Motion limits
    limits:
      max_v: 1.6      # m/s chassis cap to stay within drivetrain power envelope
      max_omega: 10.0 # rad/s yaw cap for quicker heading changes

# They have to be placed in src.missions folder (Filename is snake_case of class name)
# Order matters, first (normal) mission will be executed first
#missions:
#  #  - SetupMission: "setup" # Special mission to initialize hardware
#  #  - ShutdownMission: "shutdown" # Special mission to safely shutdown hardware
#  #  - DriveToPotatoMission # Normal mission to drive to the potato
#  - TestMission # Another normal mission for testing

definitions:
  front_left_motor:
    type: "Motor"
    port: 0            # front-left wheel on Wombat port 0
    inverted: true
    calibration:
      # Feedforward gains — tuned for faster response with minimal overshoot
      ff:
        kS: 0.08     # Static friction term; just enough to break stiction
        kV: 0.12     # Velocity feedforward; maps rad/s → % output
        kA: 0.02     # Acceleration feedforward to help with rapid ramps

      # PID gains — higher loop stiffness for quick correction
      pid:
        kp: 2.4      # Proportional gain for tight velocity tracking
        ki: 0.3      # Integral gain to clear steady-state error
        kd: 0.08     # Derivative gain to damp the stronger P term

      ticks_to_rad: 0.001534         # Encoder conversion factor (ticks → radians)
      vel_lpf_alpha: 0.8             # Velocity filter alpha; high to trust new data

  rear_left_motor:
    type: "Motor"
    port: 2            # rear-left wheel on Wombat port 2
    inverted: true
    calibration:
      ff:
        kS: 0.08
        kV: 0.12
        kA: 0.02
      pid:
        kp: 2.4
        ki: 0.3
        kd: 0.08
      ticks_to_rad: 0.001534
      vel_lpf_alpha: 0.8

  front_right_motor:
    type: "Motor"
    port: 1            # front-right wheel on Wombat port 1
    inverted: true
    calibration:
      ff:
        kS: 0.08
        kV: 0.12
        kA: 0.02
      pid:
        kp: 2.4
        ki: 0.3
        kd: 0.08
      ticks_to_rad: 0.001534
      vel_lpf_alpha: 0.8

  rear_right_motor:
    type: "Motor"
    port: 3            # rear-right wheel on Wombat port 3
    inverted: false
    calibration:
      ff:
        kS: 0.08
        kV: 0.12
        kA: 0.02
      pid:
        kp: 2.4
        ki: 0.3
        kd: 0.08
      ticks_to_rad: 0.001534
      vel_lpf_alpha: 0.8