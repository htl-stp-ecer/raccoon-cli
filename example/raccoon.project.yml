name: Example Project
uuid: ee396516-2bdb-4b01-8380-f7853273c125

robot:
  drive:
    kinematics:
      type: "mecanum"
      front_left_motor: front_left_motor
      back_left_motor: rear_left_motor
      front_right_motor: front_right_motor
      back_right_motor: rear_right_motor  # ensure each wheel has its own motor channel
      max_acceleration: 240.0            # rad/s² wheel accel ≈ 9 m/s² linear on 7.5 cm wheels
      max_velocity: 40.0                 # rad/s wheel speed ≈ 1.5 m/s chassis top speed
      track_width: 0.19       # meters (centre-to-centre spacing left↔right)
      wheel_radius: 0.03   # meters (150 mm diameter wheels)
      wheelbase: 0.12        # meters (front↔rear axle spacing)

    # Motion limits
    limits:
      max_v: 2.0      # m/s chassis cap to stay within drivetrain power envelope
      max_omega: 10.0 # rad/s yaw cap for quicker heading changes
  odometry:
    type: "FusedOdometry"
    invert_x: false
    invert_y: false
    invert_z: true
    invert_w: false

# They have to be placed in src.missions folder (Filename is snake_case of class name)
# Order matters, first (normal) mission will be executed first
missions:
#  #  - SetupMission: "setup" # Special mission to initialize hardware
#  #  - ShutdownMission: "shutdown" # Special mission to safely shutdown hardware
  - DriveToPotatoMission # Normal mission to drive to the potato
#  - TestMission # Another normal mission for testing

definitions:
  front_left_motor:
    type: "Motor"
    port: 0            # front-left wheel on Wombat port 0
    inverted: false
    calibration:
      # Feedforward gains — tuned for faster response with minimal overshoot
      ff:
        kS: 0.016920807346578488     # Static friction term; just enough to break stiction
        kV: 0.04423213915055575     # Velocity feedforward; maps rad/s → % output
        kA: 0.008667140582131706     # Acceleration feedforward to help with rapid ramps

      # PID gains — higher loop stiffness for quick correction
      pid:
        kp: 3.540848511169753      # Proportional gain for tight velocity tracking
        ki: 6.722219606647976      # Integral gain to clear steady-state error
        kd: 0.15542495525651875     # Derivative gain to damp the stronger P term

      ticks_to_rad: 0.00418879         # Encoder conversion factor (ticks → radians)
      vel_lpf_alpha: 0.8             # Velocity filter alpha; high to trust new data

  rear_left_motor:
    type: "Motor"
    port: 2            # rear-left wheel on Wombat port 2
    inverted: false
    calibration:
      ff:
        kS: 0.0067334830462057235
        kV: 0.05492798592368888
        kA: 0.00952096699338497
      pid:
        kp: 4.065085339227012
        ki: 7.713979572796428
        kd: 0.17851700992176586
      ticks_to_rad: 0.00418879
      vel_lpf_alpha: 0.8

  front_right_motor:
    type: "Motor"
    port: 1            # front-right wheel on Wombat port 1
    inverted: false
    calibration:
      ff:
        kS: 0.029539517397763042
        kV: 0.041697440852993976
        kA: 0.007724684540481093
      pid:
        kp: 3.963598212626756
        ki: 8.85105874981659
        kd: 0.14791178504928915
      ticks_to_rad: 0.00418879
      vel_lpf_alpha: 0.8
  rear_right_motor:
    type: "Motor"
    port: 3            # rear-right wheel on Wombat port 3
    inverted: false
    calibration:
      ff:
        kS: 0.024995811866685317
        kV: 0.04165603596837704
        kA: 0.007957684774524531
      pid:
        kp: 4.455453994623986
        ki: 10.006495754164112
        kd: 0.1653181991803507
      ticks_to_rad: 0.00418879
      vel_lpf_alpha: 0.8
  button:
    type: "DigitalSensor"
    port: 10